name: verify plugin

on: workflow_call

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        ide-version:
          - '2023.2'
          - '2023.3'
          - '2024.1'
          - '2024.2'
          - '2024.3'
          - '2025.1'
          - '2025.2'
          - '2025.3'
          - '2026.1'
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: Cache Gradle caches (~/.gradle/caches/)
      uses: actions/cache@v4
      with:
        path: ~/.gradle/caches
        key: v1-gradle-caches-${{ hashFiles('settings.gradle.kts') }}-${{ hashFiles('build.gradle.kts') }}-${{ hashFiles('gradle.properties') }}
    - name: Cache Gradle wrapper (~/.gradle/wrapper/)
      uses: actions/cache@v4
      with:
        path: ~/.gradle/wrapper
        key: v1-gradle-wrapper-${{ hashFiles('settings.gradle.kts') }}-${{ hashFiles('build.gradle.kts') }}-${{ hashFiles('gradle.properties') }}
    - name: Cache IntelliJ Platform artifacts (.intellijPlatform/)
      uses: actions/cache@v4
      with:
        path: .intellijPlatform
        key: v1-intellij-platform-${{ runner.os }}-${{ hashFiles('build.gradle.kts') }}
        restore-keys: |
          v1-intellij-platform-${{ runner.os }}-
    - name: verify plugin against IU ${{ matrix.ide-version }}
      run: ./gradlew verifyPlugin --no-daemon --max-workers 1 -DVERIFIER_IDE_VERSION=${{ matrix.ide-version }}
